name: Feature request
description: Suggest an improvement (new runner, better discovery, etc.)
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's missing or awkward today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
  - type: checkboxes
    id: keeps-solid-red
    attributes:
      label: Compatibility
      options:
        - label: This keeps the solid-RED guarantee (no expect.fail placeholders)
        - label: This does not hardcode a single project's stack/paths
