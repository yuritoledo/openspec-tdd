name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate JSON manifests
        run: |
          for f in .claude-plugin/marketplace.json plugins/openspec-tdd/.claude-plugin/plugin.json package.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" && echo "ok: $f"
          done

      - name: Contract tests
        run: node --test

      - name: Lint markdown
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules"
